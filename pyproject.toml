# TrustChain — Reinforcement Learning Environment for AI Hallucination Detection
# Author: HariniPrithiyangara

[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "trustchain-openenv"
version = "1.0.0"
description = "TrustChain: An OpenEnv RL environment for training and evaluating AI agent fact-checking and hallucination detection across real-world domains."
requires-python = ">=3.10"
dependencies = [
    "openenv-core[core]>=0.2.2",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=4.0.0",
]

[project.scripts]
server = "openenv.server.app:main"

[tool.setuptools]
include-package-data = true
packages = ["openenv", "openenv.server"]
package-dir = { "openenv" = ".", "openenv.server" = "server" }